<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darkglass &mdash; Blok Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0b; --bg2: #111114; --bg3: #1a1a1f;
      --border: #2a2a32; --border-bright: #3d3d4d;
      --accent: #00e5b0; --accent2: #ff4d6d; --accent3: #7c5cfc;
      --text: #e8e8f0; --text-dim: #b0b0c8; --text-dimmer: #9898b0;
      --font-a: 'Oxanium', monospace; --font-b: 'Space Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-b); min-height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
    .logo-group { display: flex; align-items: center; gap: 0.875rem; }
    .logo-mark { width: 40px; height: 40px; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-family: var(--font-a); font-weight: 700; font-size: 0.8rem; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
    .logo-text { display: flex; flex-direction: column; }
    .logo-title { font-family: var(--font-a); font-weight: 700; font-size: 1rem; letter-spacing: 0.2em; }
    .logo-sub { font-size: 0.6rem; letter-spacing: 0.3em; color: var(--accent); }
    .header-link { font-family: var(--font-a); font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-dim); text-decoration: none; border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 4px; transition: all 0.2s; }
    .header-link:hover { color: var(--accent); border-color: var(--accent); }
    main { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-family: var(--font-a); font-size: 1rem; font-weight: 700; letter-spacing: 0.2em; }
    .page-sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 4px; font-family: var(--font-a); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: #00ffcc; }
    .btn-primary:disabled { background: var(--border); color: var(--text-dimmer); cursor: not-allowed; }
    .btn-secondary { background: transparent; color: var(--accent3); border: 1px solid var(--accent3); }
    .btn-secondary:hover { background: rgba(124,92,252,0.1); }
    .btn-danger { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); font-size: 0.65rem; padding: 0.3rem 0.6rem; }
    .btn-danger:hover { background: rgba(255,77,109,0.1); }
    .status-bar { padding: 0.75rem 1rem; border-radius: 4px; font-size: 0.75rem; letter-spacing: 0.1em; display: none; }
    .status-bar.ok { background: rgba(0,229,176,0.1); border: 1px solid var(--accent); color: var(--accent); display: block; }
    .status-bar.err { background: rgba(255,77,109,0.1); border: 1px solid var(--accent2); color: var(--accent2); display: block; }
    .sectie-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 0; }
    .sectie-header { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1.25rem; background: rgba(124,92,252,0.06); border-bottom: 1px solid var(--border); }
    .sectie-naam-input { background: transparent; border: none; font-family: var(--font-a); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.2em; color: var(--accent); outline: none; width: 220px; }
    .sectie-naam-input:focus { border-bottom: 1px solid var(--accent); }
    .sectie-body { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.875rem; }
    .blok-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; display: flex; flex-direction: column; gap: 0.625rem; }
    .blok-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem; }
    .field-label { font-family: var(--font-a); font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dim); margin-bottom: 3px; display: block; }
    .text-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0.5rem 0.75rem; color: var(--text); font-family: var(--font-b); font-size: 0.75rem; outline: none; transition: border-color 0.2s; }
    .text-input:focus { border-color: var(--accent3); }
    .textarea-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0.5rem 0.75rem; color: var(--text); font-family: var(--font-b); font-size: 0.72rem; outline: none; resize: vertical; min-height: 70px; line-height: 1.5; transition: border-color 0.2s; }
    .textarea-input:focus { border-color: var(--accent3); }
    .blok-actions { display: flex; justify-content: flex-end; }
    .add-sectie-btn { width: 100%; padding: 0.875rem; background: transparent; border: 1px dashed var(--border-bright); border-radius: 4px; color: var(--text-dim); font-family: var(--font-a); font-size: 0.7rem; letter-spacing: 0.2em; cursor: pointer; transition: all 0.2s; }
    .add-sectie-btn:hover { border-color: var(--accent3); color: var(--accent3); }
    .loading-msg { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 0.2em; }
    footer { padding: 1rem 2rem; border-top: 1px solid var(--border); font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dimmer); background: var(--bg2); }
    @media (max-width: 600px) { main { padding: 1rem; } header { padding: 1rem; } .blok-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-mark">DG</div>
    <div class="logo-text">
      <span class="logo-title">ANAGRAM</span>
      <span class="logo-sub">BLOK EDITOR</span>
    </div>
  </div>
  <a href="/" class="header-link">&larr; TERUG NAAR APP</a>
</header>

<main>
  <div class="top-bar">
    <div>
      <div class="page-title">BLOK BEHEER</div>
      <div class="page-sub">Beheer de beschikbare blokken en hun parameters per sectie</div>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button class="btn btn-secondary" onclick="resetDefaults()">HERSTEL STANDAARD</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveBlocks()">OPSLAAN</button>
    </div>
  </div>

  <div id="statusBar" class="status-bar"></div>
  <div id="blocksContainer"><div class="loading-msg">Blokken laden...</div></div>
  <button class="add-sectie-btn" onclick="addSectie()">+ NIEUWE SECTIE TOEVOEGEN</button>
</main>

<footer>DARKGLASS ANAGRAM BLOK EDITOR</footer>

<script>
var blocksData = [];

// =====================
// PARSE HELPERS
// =====================
function parseBlocks(raw) {
  var data = raw;
  if (typeof data === 'string') { try { data = JSON.parse(data); } catch(e) {} }
  if (typeof data === 'string') { try { data = JSON.parse(data); } catch(e) {} }
  return Array.isArray(data) ? data : [];
}

// =====================
// LADEN
// =====================
function loadBlocks(url) {
  document.getElementById('blocksContainer').innerHTML = '<div class="loading-msg">Blokken laden...</div>';
  fetch(url || '/api/blocks')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(d) {
      blocksData = parseBlocks(d.blocks);
      if (blocksData.length === 0) {
        document.getElementById('blocksContainer').innerHTML = '<div class="loading-msg" style="color:var(--accent2)">Geen blokken gevonden. Klik HERSTEL STANDAARD.</div>';
      } else {
        renderAll();
      }
    })
    .catch(function(e) {
      document.getElementById('blocksContainer').innerHTML = '<div class="loading-msg" style="color:var(--accent2)">Fout bij laden: ' + e.message + '</div>';
    });
}

// =====================
// OPSLAAN
// =====================
function saveBlocks() {
  blocksData = readFromDom();
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'OPSLAAN...';
  fetch('/api/blocks', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ blocks: blocksData })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) throw new Error(d.error);
    showStatus('Blokken opgeslagen! De app gebruikt deze instellingen direct.', 'ok');
  })
  .catch(function(e) { showStatus('Opslaan mislukt: ' + e.message, 'err'); })
  .finally(function() { btn.disabled = false; btn.textContent = 'OPSLAAN'; });
}

// =====================
// HERSTEL
// =====================
function resetDefaults() {
  if (!confirm('Alle blokken terugzetten naar standaard?')) return;
  loadBlocks('/api/blocks?reset=1');
}

// =====================
// DOM LEZEN
// =====================
function readFromDom() {
  var secties = [];
  var sectieEls = document.querySelectorAll('.sectie-block');
  sectieEls.forEach(function(sectieEl) {
    var sectieNaam = sectieEl.querySelector('.sectie-naam-input').value.trim();
    var blokken = [];
    var blokEls = sectieEl.querySelectorAll('.blok-item');
    blokEls.forEach(function(blokEl) {
      var naamEl   = blokEl.querySelector('[data-veld="naam"]');
      var basisEl  = blokEl.querySelector('[data-veld="basis"]');
      var paramsEl = blokEl.querySelector('[data-veld="params"]');
      blokken.push({
        naam:       naamEl   ? naamEl.value.trim()   : '',
        basis:      basisEl  ? basisEl.value.trim()  : '',
        parameters: paramsEl ? paramsEl.value.trim() : ''
      });
    });
    if (sectieNaam) secties.push({ sectie: sectieNaam, blokken: blokken });
  });
  return secties;
}

// =====================
// RENDEREN
// =====================
function renderAll() {
  var container = document.getElementById('blocksContainer');
  container.innerHTML = '';
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;gap:1rem;';
  blocksData.forEach(function(sectie, si) {
    wrapper.appendChild(renderSectie(sectie, si));
  });
  container.appendChild(wrapper);
}

function renderSectie(sectie, si) {
  var div = document.createElement('div');
  div.className = 'sectie-block';

  // Header
  var header = document.createElement('div');
  header.className = 'sectie-header';

  var input = document.createElement('input');
  input.className = 'sectie-naam-input';
  input.value = sectie.sectie || '';
  input.placeholder = 'SECTIENAAM';

  var btnGroup = document.createElement('div');
  btnGroup.style.cssText = 'display:flex;gap:0.5rem;';

  var addBtn = document.createElement('button');
  addBtn.className = 'btn btn-secondary';
  addBtn.style.cssText = 'font-size:0.6rem;padding:0.3rem 0.6rem;';
  addBtn.textContent = '+ BLOK';
  addBtn.onclick = function() { addBlok(div); };

  var delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger';
  delBtn.textContent = 'x SECTIE';
  delBtn.onclick = function() {
    if (confirm('Hele sectie verwijderen inclusief alle blokken?')) div.remove();
  };

  btnGroup.appendChild(addBtn);
  btnGroup.appendChild(delBtn);
  header.appendChild(input);
  header.appendChild(btnGroup);

  // Body
  var body = document.createElement('div');
  body.className = 'sectie-body';

  (sectie.blokken || []).forEach(function(blok) {
    body.appendChild(createBlokEl(blok));
  });

  div.appendChild(header);
  div.appendChild(body);
  return div;
}

function createBlokEl(blok) {
  var item = document.createElement('div');
  item.className = 'blok-item';

  // Rij 1: naam + basis
  var row = document.createElement('div');
  row.className = 'blok-row';

  var naamGroup = document.createElement('div');
  var naamLabel = document.createElement('label');
  naamLabel.className = 'field-label';
  naamLabel.textContent = 'BLOKNAAM';
  var naamInput = document.createElement('input');
  naamInput.className = 'text-input';
  naamInput.setAttribute('data-veld', 'naam');
  naamInput.value = blok.naam || '';
  naamInput.placeholder = 'bijv. Microtubes B3K';
  naamGroup.appendChild(naamLabel);
  naamGroup.appendChild(naamInput);

  var basisGroup = document.createElement('div');
  var basisLabel = document.createElement('label');
  basisLabel.className = 'field-label';
  basisLabel.textContent = 'GEBASEERD OP';
  var basisInput = document.createElement('input');
  basisInput.className = 'text-input';
  basisInput.setAttribute('data-veld', 'basis');
  basisInput.value = blok.basis || '';
  basisInput.placeholder = 'bijv. Darkglass B3K pedaal';
  basisGroup.appendChild(basisLabel);
  basisGroup.appendChild(basisInput);

  row.appendChild(naamGroup);
  row.appendChild(basisGroup);

  // Parameters textarea
  var paramsGroup = document.createElement('div');
  var paramsLabel = document.createElement('label');
  paramsLabel.className = 'field-label';
  paramsLabel.textContent = 'PARAMETERS (kommagescheiden, met waardebereik)';
  var paramsArea = document.createElement('textarea');
  paramsArea.className = 'textarea-input';
  paramsArea.setAttribute('data-veld', 'params');
  paramsArea.value = blok.parameters || '';
  paramsArea.placeholder = 'bijv. Drive (0-100%), Blend (0-100%)';
  paramsGroup.appendChild(paramsLabel);
  paramsGroup.appendChild(paramsArea);

  // Delete knop
  var actions = document.createElement('div');
  actions.className = 'blok-actions';
  var delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger';
  delBtn.textContent = 'x VERWIJDER BLOK';
  delBtn.onclick = function() { if (confirm('Blok verwijderen?')) item.remove(); };
  actions.appendChild(delBtn);

  item.appendChild(row);
  item.appendChild(paramsGroup);
  item.appendChild(actions);
  return item;
}

function addSectie() {
  var container = document.getElementById('blocksContainer').querySelector('div') || document.getElementById('blocksContainer');
  container.appendChild(renderSectie({ sectie: 'NIEUWE SECTIE', blokken: [] }, Date.now()));
}

function addBlok(sectieEl) {
  var body = sectieEl.querySelector('.sectie-body');
  body.appendChild(createBlokEl({ naam: '', basis: '', parameters: '' }));
}

function showStatus(msg, type) {
  var bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + type;
  setTimeout(function() { bar.className = 'status-bar'; }, 4000);
}

loadBlocks();
</script>

</body>
</html>
